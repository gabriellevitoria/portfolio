<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" role="img" aria-label="Anel inteligente de monitoramento de saúde">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF6EE"/>
      <stop offset="0.34" stop-color="#E6D7C6"/>
      <stop offset="0.68" stop-color="#B29C84"/>
      <stop offset="1" stop-color="#F2E8DA"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8C7E6C"/>
      <stop offset="1" stop-color="#5F5346"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B08C"/>
      <stop offset="0.5" stop-color="#E8551F"/>
      <stop offset="1" stop-color="#B23A10"/>
    </linearGradient>
    <radialGradient id="ledGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8BF0B4"/>
      <stop offset="0.55" stop-color="#38B26A"/>
      <stop offset="1" stop-color="#1E8049"/>
    </radialGradient>
    <radialGradient id="ledRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FBC0A6"/>
      <stop offset="0.5" stop-color="#E8551F"/>
      <stop offset="1" stop-color="#B23A10"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- sombra projetada -->
  <ellipse cx="212" cy="316" rx="126" ry="19" fill="#241a12" opacity="0.16" filter="url(#soft)"/>

  <!-- espessura da banda (parte de baixo) -->
  <ellipse cx="210" cy="196" rx="118" ry="74" fill="none" stroke="url(#metalDark)" stroke-width="46"/>

  <!-- face superior da banda -->
  <ellipse cx="210" cy="176" rx="118" ry="74" fill="none" stroke="url(#metal)" stroke-width="46"/>

  <!-- brilho de borda quente (identidade do portfólio) -->
  <path d="M 100 140 A 118 74 0 0 1 320 140" fill="none" stroke="url(#rim)" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <!-- realce especular no topo -->
  <path d="M 128 150 A 96 58 0 0 1 250 132" fill="none" stroke="#FFFDF9" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- arestas para definição -->
  <ellipse cx="210" cy="176" rx="141" ry="97" fill="none" stroke="#8f8272" stroke-width="1.5" opacity="0.45"/>
  <ellipse cx="210" cy="176" rx="95" ry="51" fill="none" stroke="#6f6455" stroke-width="1.5" opacity="0.5"/>

  <!-- sensores de saúde (LEDs no interior da banda) -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="180" cy="220" r="9" fill="url(#ledGreen)"/>
    <circle cx="210" cy="226" r="9" fill="url(#ledRed)"/>
    <circle cx="240" cy="220" r="9" fill="url(#ledGreen)"/>
  </g>
  <circle cx="180" cy="220" r="5.5" fill="#B6F2CF"/>
  <circle cx="210" cy="226" r="5.5" fill="#FBD3C0"/>
  <circle cx="240" cy="220" r="5.5" fill="#B6F2CF"/>
</svg>
